<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>錯題掃描器 - 像素全修復版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-color: #0d5c52; --bg-gray: #f0f2f5; }
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; touch-action: none; }
        body { font-family: sans-serif; background-color: var(--bg-gray); display: flex; justify-content: center; align-items: center; height: 100svh; margin: 0; overflow: hidden; }
        .app-container { width: 100%; max-width: 800px; height: 100%; background: white; display: flex; flex-direction: column; }
        .header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; flex-shrink: 0; }
        .steps { display: flex; gap: 8px; }
        .step-num { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; background: #eee; color: #666; }
        .step-num.active { background: var(--primary-color); color: white; }
        
        .content { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .page { display: none; width: 100%; height: 100%; padding: 15px; flex-direction: column; }
        .page.active { display: flex; }
        
        .canvas-area { width: 100%; flex: 1; background: #222; border-radius: 12px; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #editing-canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        #preview-img { max-width: 100%; max-height: 100%; pointer-events: none; }
        .selection-box { position: absolute; border: 2px solid #2dbfb2; background: rgba(45,191,178,0.2); display: none; pointer-events: none; }
        
        .edit-controls { padding: 10px 0; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
        .control-group { display: flex; align-items: center; gap: 10px; font-size: 13px; height: 35px; }
        .control-group input { flex: 1; accent-color: var(--primary-color); touch-action: auto; height: 25px; }
        .control-group span { width: 35px; text-align: right; font-family: monospace; }
        
        .footer { padding: 10px 0; display: flex; gap: 10px; flex-shrink: 0; }
        .btn-secondary { background: #eee; border: none; padding: 12px; border-radius: 8px; flex: 1; cursor: pointer; font-size: 14px; }
        .btn-primary { background: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 8px; flex: 2; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-primary:disabled { background: #ccc; opacity: 0.6; }

        @media (orientation: landscape) {
            #page-3.page { flex-direction: row; gap: 15px; }
            #page-3 .edit-controls { width: 200px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="steps">
            <div id="s1" class="step-num active">1</div>
            <div id="s2" class="step-num">2</div>
            <div id="s3" class="step-num">3</div>
            <div id="s4" class="step-num">4</div>
        </div>
        <i class="fa-solid fa-rotate-left" onclick="resetApp()"></i>
    </div>
    <div class="content">
        <div id="page-1" class="page active">
            <div style="flex:1; border:2px dashed #ccc; border-radius:15px; display:flex; flex-direction:column; justify-content:center; align-items:center;" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-image fa-3x" style="color:var(--primary-color); margin-bottom:15px"></i>
                <b>點擊上傳或拍攝題目</b>
            </div>
            <input type="file" id="file-input" hidden accept="image/*">
        </div>

        <div id="page-2" class="page">
            <div style="margin-bottom:8px; font-size:14px; color:var(--primary-color);"><b>框選範圍後按下一步</b></div>
            <div class="canvas-area" id="canvas-v2">
                <img id="preview-img" src="" draggable="false">
                <div id="selection" class="selection-box"></div>
            </div>
            <div class="footer">
                <button class="btn-secondary" onclick="resetApp()">重選</button>
                <button id="btn-next" class="btn-primary" onclick="goToEdit()" disabled>下一步</button>
            </div>
        </div>

        <div id="page-3" class="page">
            <div class="canvas-area"><canvas id="editing-canvas"></canvas></div>
            <div class="edit-controls">
                <div class="control-group"><label>對比</label><input type="range" id="contrast" min="0" max="255" value="160"><span id="v-contrast">160</span></div>
                <div class="control-group"><label>亮度</label><input type="range" id="brightness" min="-100" max="100" value="20"><span id="v-brightness">20</span></div>
                <div class="control-group"><label>飽和</label><input type="range" id="saturate" min="0" max="200" value="100"><span id="v-saturate">100</span></div>
                <button onclick="rotate90()" style="width:100%; padding:8px; background:#ddd; border:none; border-radius:8px; margin-top:5px;">旋轉 +90°</button>
            </div>
            <div class="footer"><button class="btn-secondary" onclick="switchPage(2)">返回</button><button class="btn-primary" onclick="goToExport()">匯出</button></div>
        </div>

        <div id="page-4" class="page">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; flex:1;">
                <div><span>黑白</span><img id="export-bw" style="width:100%; border:1px solid #ddd;"><button class="btn-primary" style="width:100%; margin-top:5px;" onclick="downloadImg('export-bw', 'BW.png')">下載</button></div>
                <div><span>彩色</span><img id="export-color" style="width:100%; border:1px solid #ddd;"><button class="btn-primary" style="width:100%; margin-top:5px;" onclick="downloadImg('export-color', 'Color.png')">下載</button></div>
            </div>
            <div class="footer"><button class="btn-secondary" style="width:100%" onclick="resetApp()">下一題</button></div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input'), previewImg = document.getElementById('preview-img'), selection = document.getElementById('selection'), canvasV2 = document.getElementById('canvas-v2'), editCanvas = document.getElementById('editing-canvas'), btnNext = document.getElementById('btn-next');
    const ctx = editCanvas.getContext('2d');
    let isDrawing = false, startX, startY;
    window.rawCropData = null;

    function switchPage(n) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${n}`).classList.add('active');
        document.querySelectorAll('.step-num').forEach((s, i) => s.className = i+1 <= n ? 'step-num active' : 'step-num');
    }

    function resetApp() { fileInput.value = ""; previewImg.src = ""; selection.style.display = 'none'; btnNext.disabled = true; switchPage(1); }

    fileInput.onchange = (e) => {
        if (e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => { previewImg.src = ev.target.result; switchPage(2); };
            reader.readAsDataURL(e.target.files[0]);
        }
    };

    function handleStart(e) {
        isDrawing = true; const r = canvasV2.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        startX = clientX - r.left; startY = clientY - r.top;
        selection.style.cssText = `display:block; left:${startX}px; top:${startY}px; width:0; height:0;`;
    }
    function handleMove(e) {
        if (!isDrawing) return;
        const r = canvasV2.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let x = Math.max(0, Math.min(clientX - r.left, r.width)), y = Math.max(0, Math.min(clientY - r.top, r.height));
        let w = Math.abs(x - startX), h = Math.abs(y - startY);
        selection.style.left = Math.min(x, startX)+'px'; selection.style.top = Math.min(y, startY)+'px';
        selection.style.width = w+'px'; selection.style.height = h+'px';
        btnNext.disabled = (w < 20 || h < 20);
    }

    canvasV2.addEventListener('mousedown', handleStart);
    canvasV2.addEventListener('touchstart', handleStart, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => { if(isDrawing) e.preventDefault(); handleMove(e); }, {passive: false});
    window.addEventListener('mouseup', () => isDrawing = false);
    window.addEventListener('touchend', () => isDrawing = false);

    function goToEdit() {
        const r = canvasV2.getBoundingClientRect(), ir = previewImg.getBoundingClientRect();
        const sx = previewImg.naturalWidth / ir.width, sy = previewImg.naturalHeight / ir.height;
        const cx = (parseFloat(selection.style.left) - (ir.left - r.left)) * sx;
        const cy = (parseFloat(selection.style.top) - (ir.top - r.top)) * sy;
        const cw = parseFloat(selection.style.width) * sx, ch = parseFloat(selection.style.height) * sy;
        
        editCanvas.width = cw; editCanvas.height = ch;
        ctx.drawImage(previewImg, cx, cy, cw, ch, 0, 0, cw, ch);
        window.rawCropData = ctx.getImageData(0, 0, cw, ch);
        
        switchPage(3);
        applyManualFilters();
    }

    // 核心修復：包含對比、亮度、飽和度的像素運算
    function applyManualFilters() {
        if (!window.rawCropData) return;
        const contrast = parseFloat(document.getElementById('contrast').value);
        const brightness = parseFloat(document.getElementById('brightness').value);
        const saturate = parseFloat(document.getElementById('saturate').value) / 100;
        
        document.getElementById('v-contrast').innerText = contrast;
        document.getElementById('v-brightness').innerText = brightness;
        document.getElementById('v-saturate').innerText = Math.round(saturate * 100);

        const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));
        const newImgData = new ImageData(new Uint8ClampedArray(window.rawCropData.data), window.rawCropData.width, window.rawCropData.height);
        const d = newImgData.data;

        for (let i = 0; i < d.length; i += 4) {
            let r = d[i], g = d[i+1], b = d[i+2];

            // 1. 亮度處理
            r += brightness; g += brightness; b += brightness;
            
            // 2. 對比度處理
            r = factor * (r - 128) + 128;
            g = factor * (g - 128) + 128;
            b = factor * (b - 128) + 128;

            // 3. 飽和度處理 (Luma coefficients for REC 709)
            const gray = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            r = gray + (r - gray) * saturate;
            g = gray + (g - gray) * saturate;
            b = gray + (b - gray) * saturate;

            d[i] = r; d[i+1] = g; d[i+2] = b;
        }

        ctx.putImageData(newImgData, 0, 0);
    }

    function rotate90() {
        const offCanvas = document.createElement('canvas');
        offCanvas.width = editCanvas.height; offCanvas.height = editCanvas.width;
        const oCtx = offCanvas.getContext('2d');
        oCtx.translate(offCanvas.width/2, offCanvas.height/2);
        oCtx.rotate(Math.PI/2);
        oCtx.drawImage(editCanvas, -editCanvas.width/2, -editCanvas.height/2);
        
        editCanvas.width = offCanvas.width; editCanvas.height = offCanvas.height;
        ctx.drawImage(offCanvas, 0, 0);
        window.rawCropData = ctx.getImageData(0, 0, editCanvas.width, editCanvas.height);
        applyManualFilters();
    }

    document.getElementById('contrast').oninput = applyManualFilters;
    document.getElementById('brightness').oninput = applyManualFilters;
    document.getElementById('saturate').oninput = applyManualFilters;

    function goToExport() {
        document.getElementById('export-color').src = editCanvas.toDataURL("image/png");
        const bw = document.createElement('canvas');
        bw.width = editCanvas.width; bw.height = editCanvas.height;
        const bCtx = bw.getContext('2d');
        const d = ctx.getImageData(0,0,bw.width,bw.height);
        for (let i=0; i<d.data.length; i+=4) {
            const v = (d.data[i]+d.data[i+1]+d.data[i+2])/3 < 127 ? 0 : 255;
            d.data[i] = d.data[i+1] = d.data[i+2] = v;
        }
        bCtx.putImageData(d, 0, 0);
        document.getElementById('export-bw').src = bw.toDataURL("image/png");
        switchPage(4);
    }
    function downloadImg(id, name) { const a = document.createElement('a'); a.href = document.getElementById(id).src; a.download = name; a.click(); }
</script>
</body>
</html>
